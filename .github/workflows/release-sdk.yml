name: Release SDK

on:
  push:
    tags:
      - 'sdk-v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build, Test, Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-v}"
          pnpm --filter @newio/agent-sdk exec npm pkg set version="$VERSION"

      - run: pnpm --filter @newio/agent-sdk run build
      - run: pnpm --filter @newio/agent-sdk run test

      - name: Publish to npm
        run: pnpm --filter @newio/agent-sdk publish --no-git-checks --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
