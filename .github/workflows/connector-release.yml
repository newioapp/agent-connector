name: Connector Release

on:
  push:
    tags:
      - 'connector-v*'
      - 'dev-connector-v*'
      - 'integ-connector-v*'

permissions:
  id-token: write
  contents: write

concurrency:
  group: connector-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.parse.outputs.version }}
      channel: ${{ steps.parse.outputs.channel }}
      stage: ${{ steps.parse.outputs.stage }}
      app_display_name: ${{ steps.parse.outputs.app_display_name }}
      enable_dev_tools: ${{ steps.parse.outputs.enable_dev_tools }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          if [[ "$TAG" == dev-connector-v* ]]; then
            STAGE="dev"
            VERSION="${TAG#dev-connector-v}"
          elif [[ "$TAG" == integ-connector-v* ]]; then
            STAGE="integ"
            VERSION="${TAG#integ-connector-v}"
          else
            STAGE="prod"
            VERSION="${TAG#connector-v}"
          fi

          if [[ "$VERSION" == *"-beta"* ]]; then
            CHANNEL="beta"
          else
            CHANNEL="stable"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "stage=$STAGE" >> "$GITHUB_OUTPUT"

          # Stage-specific config (non-secret values only)
          case "$STAGE" in
            dev)
              echo "app_display_name=Agent Connector (Dev)" >> "$GITHUB_OUTPUT"
              echo "enable_dev_tools=true" >> "$GITHUB_OUTPUT"
              ;;
            integ)
              echo "app_display_name=Agent Connector (Integ)" >> "$GITHUB_OUTPUT"
              echo "enable_dev_tools=true" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "app_display_name=Agent Connector" >> "$GITHUB_OUTPUT"
              echo "enable_dev_tools=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

  build-mac:
    needs: prepare
    runs-on: ${{ matrix.arch == 'x64' && 'macos-15-intel' || 'macos-latest' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm build
        env:
          API_BASE_URL: ${{ secrets[format('{0}_API_BASE_URL', needs.prepare.outputs.stage == 'dev' && 'DEV' || needs.prepare.outputs.stage == 'integ' && 'INTEG' || 'PROD')] }}
          WS_BASE_URL: ${{ secrets[format('{0}_WS_BASE_URL', needs.prepare.outputs.stage == 'dev' && 'DEV' || needs.prepare.outputs.stage == 'integ' && 'INTEG' || 'PROD')] }}
          APP_DISPLAY_NAME: ${{ needs.prepare.outputs.app_display_name }}
          ENABLE_DEV_TOOLS: ${{ needs.prepare.outputs.enable_dev_tools }}

      - name: Set version
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version
        working-directory: packages/connector

      - name: Import code signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - name: Select Xcode 26 (required for .icon asset catalog)
        run: |
          XCODE_26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE_26"
          sudo xcode-select -s "$XCODE_26/Contents/Developer"

      - name: Build Electron app
        run: pnpm --filter @newio/connector exec electron-builder --mac --${{ matrix.arch }} -c.productName="${{ needs.prepare.outputs.app_display_name }}"
        env:
          PUBLISH_URL: ${{ secrets[format('{0}_PUBLISH_URL', needs.prepare.outputs.stage == 'dev' && 'DEV' || needs.prepare.outputs.stage == 'integ' && 'INTEG' || 'PROD')] }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true

      - uses: actions/upload-artifact@v6
        with:
          name: mac-${{ matrix.arch }}
          retention-days: 1
          path: |
            packages/connector/dist/*.dmg
            packages/connector/dist/*.zip
            packages/connector/dist/*.yml

  build-linux:
    needs: prepare
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm build
        env:
          API_BASE_URL: ${{ secrets[format('{0}_API_BASE_URL', needs.prepare.outputs.stage == 'dev' && 'DEV' || needs.prepare.outputs.stage == 'integ' && 'INTEG' || 'PROD')] }}
          WS_BASE_URL: ${{ secrets[format('{0}_WS_BASE_URL', needs.prepare.outputs.stage == 'dev' && 'DEV' || needs.prepare.outputs.stage == 'integ' && 'INTEG' || 'PROD')] }}
          APP_DISPLAY_NAME: ${{ needs.prepare.outputs.app_display_name }}
          ENABLE_DEV_TOOLS: ${{ needs.prepare.outputs.enable_dev_tools }}

      - name: Set version
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version
        working-directory: packages/connector

      - name: Build Electron app
        run: pnpm --filter @newio/connector exec electron-builder --linux --${{ matrix.arch }} -c.productName="${{ needs.prepare.outputs.app_display_name }}"
        env:
          PUBLISH_URL: ${{ secrets[format('{0}_PUBLISH_URL', needs.prepare.outputs.stage == 'dev' && 'DEV' || needs.prepare.outputs.stage == 'integ' && 'INTEG' || 'PROD')] }}

      - uses: actions/upload-artifact@v6
        with:
          name: linux-${{ matrix.arch }}
          retention-days: 1
          path: |
            packages/connector/dist/*.AppImage
            packages/connector/dist/*.deb
            packages/connector/dist/*.yml

  publish:
    needs: [prepare, build-mac, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: packages/connector/scripts

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install merge script dependencies
        run: npm install js-yaml

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets[format('{0}_ROLE_ARN', needs.prepare.outputs.stage == 'dev' && 'DEV' || needs.prepare.outputs.stage == 'integ' && 'INTEG' || 'PROD')] }}
          aws-region: us-east-1

      - uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Merge update manifests
        run: node packages/connector/scripts/merge-update-manifests.js artifacts

      - name: Upload to S3
        run: |
          BUCKET="${{ secrets[format('{0}_DOWNLOADS_BUCKET', needs.prepare.outputs.stage == 'dev' && 'DEV' || needs.prepare.outputs.stage == 'integ' && 'INTEG' || 'PROD')] }}"
          S3_PATH="s3://${BUCKET}/downloads/connector/"

          for dir in artifacts/*/; do
            aws s3 cp "$dir" "$S3_PATH" --recursive \
              --exclude "*" \
              --include "*.dmg" \
              --include "*.zip" \
              --include "*.AppImage" \
              --include "*.deb"
          done

          for yml in artifacts/*.yml; do
            [ -f "$yml" ] && aws s3 cp "$yml" "$S3_PATH"
          done

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets[format('{0}_DISTRIBUTION_ID', needs.prepare.outputs.stage == 'dev' && 'DEV' || needs.prepare.outputs.stage == 'integ' && 'INTEG' || 'PROD')] }}" \
            --paths "/downloads/connector/*"

      - name: Create GitHub Release
        if: needs.prepare.outputs.stage == 'prod'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
