name: CodeQL

# CodeQL requires GitHub Advanced Security (free for public repos only).
# Enable this workflow when the repo is made public.

on:
  # pull_request:
  #   branches: [main]
  schedule:
    - cron: '0 9 * * 3' # Weekly on Wednesday at 9am UTC

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # Only run on public repos (CodeQL is free for public, paid for private)
    if: ${{ github.repository_visibility == 'public' }}
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v4
