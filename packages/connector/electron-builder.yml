appId: dev.newio.connector
productName: Newio Agent Connector
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc}'
npmRebuild: true

# --- Auto-update via generic provider (S3 + CloudFront CDN) ---
detectUpdateChannel: true
publish:
  provider: generic
  url: ${env.PUBLISH_URL}

# --- macOS ---
mac:
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  artifactName: newio-agent-connector-${version}-mac-${arch}.${ext}
  target:
    - dmg
    - zip
dmg:
  writeUpdateInfo: false

# --- Linux ---
linux:
  category: Network;Development
  artifactName: newio-agent-connector-${version}-linux-${arch}.${ext}
  target:
    - AppImage
    - deb
