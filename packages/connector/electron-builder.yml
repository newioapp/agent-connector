appId: dev.newio.connector
productName: Newio Agent Connector
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
npmRebuild: false
mac:
  notarize: false
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
linux:
  category: Network
  target:
    - target: AppImage
      arch:
        - x64
win:
  target:
    - target: nsis
      arch:
        - x64
