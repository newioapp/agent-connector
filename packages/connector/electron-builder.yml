appId: dev.newio.connector
productName: Agent Connector
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc}'
  - '!coverage/*'
npmRebuild: true
asarUnpack:
  # The MCP bridge is spawned as a child `node` process by ACP agents.
  # Files inside asar archives cannot be executed directly — unpack so
  # require.resolve() returns a real filesystem path that `node` can run.
  - 'node_modules/@newio/mcp-server/dist/bridge.js'

# --- Auto-update via generic provider (S3 + CloudFront CDN) ---
detectUpdateChannel: true
publish:
  provider: generic
  url: ${env.PUBLISH_URL}

# --- macOS ---
mac:
  icon: build/icon.icon
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  artifactName: agent-connector-${version}-mac-${arch}.${ext}
  target:
    - dmg
    - zip
dmg:
  writeUpdateInfo: false

# --- Linux ---
linux:
  category: Network;Development
  artifactName: agent-connector-${version}-linux-${arch}.${ext}
  target:
    - AppImage
    - deb
